name: continuious integration
on: workflow_dispatch
jobs:
  check-out:
    runs-on: ubuntu-latest
    steps:
    - name: code checkout
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
          distribution: 'temurin'
          java-version: '17'

    - name: Build with Maven
      run: mvn clean install
    
  

      
       
  
